        <a href="/es/works" class="{{if eq .Path "/works"}}dock-item active{{else}}dock-item{{end}}">

        <a href="/es/blog" class="{{if eq .Path "/blog"}}dock-item active{{else}}dock-item{{end}}">

{{if .ShowSayHelloToast}}
<div class="toast-container position-fixed top-50 start-50 translate-middle p-3" style="z-index: 5000">
  <div id="sayHelloToast" class="toast show toast-gradient-border" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <i class="fa-solid fa-satellite-dish me-2 text-primary"></i>
      <strong class="me-auto text-dark">Señales Sistema </strong>
      <small class="text-dark">Ahora</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body text-dark">
      OK, hello! Seña recibida.
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toastElement = document.getElementById('sayHelloToast');
    
    if (toastElement) {
      const toast = new bootstrap.Toast(toastElement);
      toast.show();
    }
  });
</script>
{{end}}
